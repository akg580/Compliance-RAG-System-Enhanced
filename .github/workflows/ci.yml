name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend (Python 3.11)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rag-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: rag-backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Syntax check
        run: python -m py_compile main.py jwt_auth.py models/models.py services/vector_store.py services/rag_service.py services/document_processor.py app_config/config.py
        env:
          JWT_SECRET: "ci-test-secret-32-chars-minimum!!"
          GROQ_API_KEY: ""

  frontend:
    name: Frontend (Node 22)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://compliance-ai-backend.onrender.com
      - name: Check dist
        run: ls dist/