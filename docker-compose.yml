version: "3.9"

services:
  backend:
    build:
      context: ./rag-backend
    ports:
      - "8000:8000"
    env_file:
      - ./rag-backend/.env
    volumes:
      - ./rag-backend/uploads:/app/uploads
      - ./rag-backend/rag_cache:/app/rag_cache

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://localhost:8000
