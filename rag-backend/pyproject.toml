# pyproject.toml — Python tool config (Ruff linter/formatter) (#13)
[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "W", "F", "I"]
ignore = ["E501", "E741"]

[tool.ruff.lint.isort]
known-first-party = ["app_config", "models", "services"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]