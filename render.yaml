# Render.com blueprint
# Update the service names, env vars, and URLs as needed for your project.
services:
  - type: web
    name: rag-backend
    runtime: python
    rootDir: rag-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://your-frontend.onrender.com
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false

  - type: web
    name: rag-frontend
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist -l $PORT
    envVars:
      - key: VITE_API_BASE
        value: https://your-backend.onrender.com
